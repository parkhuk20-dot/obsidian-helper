<main><section><p class="eyebrow">NOTE WORKSPACE</p><h1>노트 작성</h1><p class="section-desc">떠오른 생각을 짧게 기록하세요. 두 개 이상 모이면 그래프 탐색 페이지에서 AI 연결 분석을 할 수 있어요.</p><div class="note-form card"><input type="text" id="note-title" placeholder="노트 제목" maxlength="100"><textarea id="note-content" placeholder="내용을 적어주세요 (최대 500자)" maxlength="500" rows="5"></textarea><div class="form-footer"><span class="char-count"><span id="note-char-count">0</span>/500</span><button id="add-note-btn" class="btn btn-primary">노트 추가</button></div><p id="note-form-msg" class="error-msg" hidden></p><p id="sync-status" class="muted" hidden></p></div><div id="notes-list" class="notes-grid"></div><p id="notes-empty" class="muted">아직 노트가 없어요. 첫 노트를 추가해보세요!</p><a class="btn btn-secondary" href="workspace.html">그래프 탐색으로 이동</a></section></main><footer class="site-footer"><span>🌲 정리의 숲</span><a href="workspace.html">그래프 탐색하기</a></footer><script src="js/common.js?v=4"></script><script src="js/notes.js?v=2"></script><script src="js/main.js?v=6"></script></body></html>
