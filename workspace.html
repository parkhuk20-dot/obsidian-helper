<main><section><p class="eyebrow">INTERACTIVE GRAPH</p><h1>그래프 탐색</h1><p class="section-desc">마우스 휠로 확대·축소하고, 빈 공간을 끌어 화면을 이동하세요. 노드를 끌어 원하는 위치에 놓고, 클릭해서 메모 내용을 확인하세요.</p><div class="model-settings card"><div><h2>AI 모델 설정</h2><p>선택한 공급자의 서버 API 키가 설정되어 있어야 해요.</p></div><div class="model-selects"><label>공급자<select id="ai-provider"><option value="openai">OpenAI (GPT)</option><option value="anthropic">Anthropic (Claude)</option><option value="google">Google (Gemini)</option></select></label><label>세부 모델<select id="ai-model"></select></label></div></div><div class="analyze-bar"><button id="analyze-btn" class="btn btn-primary btn-lg" disabled>내 노트 AI 분석</button><p id="analyze-hint" class="muted">노트 작성 페이지에서 노트를 2개 이상 추가하세요.</p></div><div id="analyze-status"></div><div id="result-area" class="result-area" hidden><div class="interactive-graph card"><div class="graph-wrap"><div class="graph-search" id="graph-search"><button id="graph-search-toggle" class="graph-search-toggle" type="button" aria-label="노트 검색" title="노트 검색">🔍</button><input type="text" id="graph-search-input" placeholder="노트 검색…" hidden></div><canvas id="graph"></canvas><div id="graph-tooltip" class="graph-tooltip" hidden></div></div><aside id="graph-detail" class="graph-detail" hidden><div id="graph-detail-view"><div class="graph-detail-header"><p class="eyebrow">SELECTED NOTE</p><button id="graph-detail-edit-btn" class="detail-edit-toggle" type="button" hidden aria-label="노트 편집" title="노트 편집">⚙️</button></div><h2 id="graph-detail-title"></h2><p id="graph-detail-content"></p><div id="graph-detail-keywords" class="note-keywords"></div></div><div id="graph-detail-edit-form" hidden><label>제목<input type="text" id="detail-edit-title" maxlength="100"></label><label>내용<textarea id="detail-edit-content" maxlength="500" rows="4"></textarea></label><label>키워드 (쉼표로 구분, 최대 3개)<input type="text" id="detail-edit-keywords" placeholder="예: 요리, 볶음밥"></label><p id="detail-edit-msg" class="error-msg" hidden></p><div class="graph-detail-actions"><button id="detail-edit-cancel" class="btn btn-secondary" type="button">취소</button><button id="detail-edit-save" class="btn btn-primary" type="button">저장</button></div></div></aside></div><button id="copy-md-btn" class="btn btn-secondary">현재 그래프 노트 복사</button></div></section></main><footer class="site-footer"><span>🌲 정리의 숲</span><a href="notes.html">노트 작성하기</a></footer><script src="js/common.js?v=5"></script><script src="js/notes.js?v=4"></script><script src="js/main.js?v=8"></script><script src="js/graph.js?v=28"></script><script src="js/graph-page.js?v=7"></script></body></html>
