<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>아이디어 그래프 — 정리의 숲</title><link rel="stylesheet" href="css/style.css?v=2"></head>
<body>
  <header class="site-header"><a href="index.html" class="logo">🌲 정리의 숲</a><div class="header-actions"><button class="theme-toggle" type="button" aria-label="라이트 모드로 전환" title="테마 전환">☀️</button><button class="hamburger" aria-label="메뉴 열기" aria-expanded="false"><span></span><span></span><span></span></button></div><nav class="site-nav"><a href="index.html">홈</a><a href="workspace.html" aria-current="page">아이디어 그래프</a><a href="tools.html">AI 도구</a><a href="guide.html">가이드·FAQ</a></nav></header>
  <main><section id="workspace"><p class="eyebrow">IDEA GRAPH</p><h1>아이디어 그래프</h1><p class="section-desc">생각나는 대로 노트를 추가하고, AI에게 연결 분석을 맡겨보세요.</p>
    <div class="note-form card"><input type="text" id="note-title" placeholder="노트 제목" maxlength="100"><textarea id="note-content" placeholder="내용을 적어주세요 (최대 500자)" maxlength="500" rows="4"></textarea><div class="form-footer"><span class="char-count"><span id="note-char-count">0</span>/500</span><button id="add-note-btn" class="btn btn-primary">노트 추가</button></div><p id="note-form-msg" class="error-msg" hidden></p></div>
    <div id="notes-list" class="notes-grid"></div><p id="notes-empty" class="muted">아직 노트가 없어요. 첫 노트를 추가해보세요!</p>
    <div class="analyze-bar"><button id="analyze-btn" class="btn btn-primary btn-lg" disabled>AI 연결 분석</button><p id="analyze-hint" class="muted">노트가 2개 이상이면 분석할 수 있어요.</p></div><div id="analyze-status"></div>
    <div id="result-area" class="result-area" hidden><h2>분석 결과</h2><div class="result-layout"><div class="graph-wrap card"><canvas id="graph"></canvas></div><div class="links-wrap"><div id="links-list"></div><button id="copy-md-btn" class="btn btn-secondary">옵시디언용 마크다운 복사</button></div></div></div>
  </section></main>
  <footer class="site-footer"><span>🌲 정리의 숲</span><a href="guide.html">옵시디언 가이드 보기</a></footer>
  <script src="js/common.js"></script><script src="js/notes.js"></script><script src="js/graph.js"></script><script src="js/main.js"></script>
</body></html>
