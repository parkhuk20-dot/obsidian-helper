<main><section><p class="eyebrow">INTERACTIVE GRAPH</p><h1>그래프 탐색</h1><p class="section-desc">노드를 끌어 원하는 위치에 놓고, 클릭해서 메모 내용을 확인하세요. 마우스를 가까이 가져가면 제목이 보여요.</p><div class="model-settings card"><div><h2>AI 모델 설정</h2><p>선택한 공급자의 서버 API 키가 설정되어 있어야 해요.</p></div><div class="model-selects"><label>공급자<select id="ai-provider"><option value="openai">OpenAI (GPT)</option><option value="anthropic">Anthropic (Claude)</option><option value="google">Google (Gemini)</option></select></label><label>세부 모델<select id="ai-model"></select></label></div></div><div class="analyze-bar"><button id="analyze-btn" class="btn btn-primary btn-lg" disabled>내 노트 AI 분석</button><button id="demo-graph-btn" class="btn btn-secondary">5개 예시 그래프</button><button id="demo-large-graph-btn" class="btn btn-secondary">100개 메모 예시</button><p id="analyze-hint" class="muted">노트 작성 페이지에서 노트를 2개 이상 추가하세요.</p></div><div id="analyze-status"></div><div id="result-area" class="result-area" hidden><div class="interactive-graph card"><div class="graph-wrap"><canvas id="graph"></canvas><div id="graph-tooltip" class="graph-tooltip" hidden></div></div><aside id="graph-detail" class="graph-detail" hidden><p class="eyebrow">SELECTED NOTE</p><h2 id="graph-detail-title"></h2><p id="graph-detail-content"></p></aside></div><button id="copy-md-btn" class="btn btn-secondary">현재 그래프 노트 복사</button></div></section></main><footer class="site-footer"><span>🌲 정리의 숲</span><a href="notes.html">노트 작성하기</a></footer><script src="js/common.js?v=3"></script><script src="js/notes.js"></script><script src="js/main.js?v=4"></script><script src="js/graph.js?v=3"></script><script src="js/graph-page.js?v=1"></script></body></html>
