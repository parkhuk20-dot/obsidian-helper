<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI 도구 — 정리의 숲</title><link rel="stylesheet" href="css/style.css?v=4"></head>
<body>
  <header class="site-header"><a href="index.html" class="logo">🌲 정리의 숲</a><div class="header-actions"><button class="theme-toggle" type="button" aria-label="라이트 모드로 전환" title="테마 전환">☀️</button><button class="hamburger" aria-label="메뉴 열기" aria-expanded="false"><span></span><span></span><span></span></button></div><nav class="site-nav"><a href="index.html">홈</a><a href="workspace.html">아이디어 그래프</a><a href="tools.html" aria-current="page">AI 도구</a><a href="guide.html">가이드·FAQ</a></nav></header>
  <main><section id="tools"><p class="eyebrow">AI TOOLS</p><h1>AI 도구</h1><p class="section-desc">메모를 정리하거나 옵시디언 사용법을 물어보세요.</p>
    <div class="model-settings card"><div><h2>AI 모델 설정</h2><p>선택한 공급자의 서버 API 키가 설정되어 있어야 해요.</p></div><div class="model-selects"><label>공급자<select id="ai-provider"><option value="openai">OpenAI (GPT)</option><option value="anthropic">Anthropic (Claude)</option><option value="google">Google (Gemini)</option></select></label><label>세부 모델<select id="ai-model"></select></label></div></div>
    <div class="tabs"><button class="tab-btn active" data-tab="tab-organize">노트 정리기</button><button class="tab-btn" data-tab="tab-chat">Q&amp;A 챗봇</button></div>
    <div id="tab-organize" class="tab-panel active"><div id="organize" class="anchor-target"><p class="section-desc">두서없는 메모를 붙여넣으면 옵시디언 형식(태그·내부링크 포함)으로 정리해드려요.</p><div class="card"><textarea id="organize-input" placeholder="정리할 메모를 붙여넣어주세요 (최대 5,000자)" maxlength="5000" rows="8"></textarea><div class="form-footer"><span class="char-count"><span id="organize-char-count">0</span>/5000</span><button id="organize-btn" class="btn btn-primary">정리하기</button></div></div><div id="organize-status"></div><div id="organize-result-wrap" hidden><pre id="organize-result"></pre><button id="organize-copy-btn" class="btn btn-secondary">복사</button></div></div></div>
    <div id="tab-chat" class="tab-panel"><div id="chat" class="anchor-target"><p class="section-desc">옵시디언에 대해 무엇이든 물어보세요.</p><div class="chat-box card"><div id="chat-messages" class="chat-messages"><div class="bubble ai">안녕하세요! 옵시디언에 대해 궁금한 걸 물어보세요. 예: “Vault가 뭐예요?”</div></div><div id="chat-status"></div><div class="chat-input-row"><input type="text" id="chat-input" placeholder="질문을 입력해주세요 (최대 500자)" maxlength="500"><button id="chat-send-btn" class="btn btn-primary">전송</button></div></div></div></div>
  </section></main>
  <footer class="site-footer"><span>🌲 정리의 숲</span><a href="workspace.html">아이디어 그래프 보기</a></footer>
  <script src="js/common.js?v=2"></script><script src="js/main.js?v=2"></script>
</body></html>
